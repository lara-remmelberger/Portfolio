<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        
        /* Navigation Bar */
        nav {
            background-color: #1e1e1e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        nav h1 {
            margin: 0;
            font-size: 24px;
            color: #00bcd4; 
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }
        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #00bcd4;
        }

        /* unity game section */
        .game-container {
            width: 100%;
            max-width: 1000px; /* game width */
            margin: 60px auto;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 600px; /* game height */
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            background-color: #000; 
        }

        /* Video gallery */
        .section {
            max-width: 1000px;
            margin: 0 auto 80px auto;
            padding: 0 20px;
        }
        .section h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .video-card {
            background-color: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .video-card img {
            width: 100%;
            display: block;
            transition: transform 0.3s;
        }
        .video-card img:hover {
            transform: scale(1.05); 
        }
        .video-card h3 {
            margin: 20px 0 5px 0;
            font-size: 20px;
        }
        .video-card p {
            margin: 0;
            color: #aaaaaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <h1>My Portfolio</h1>
        <ul>
            <li><a href="#game">Game</a></li>
            <li><a href="#videos">Videos</a></li>
        </ul>
    </nav>

    <!-- Unity Game -->
    <div id="game" class="game-container">
        <iframe src="game/index.html"></iframe>
    </div>

    <!-- Video section -->
    <div id="videos" class="section">
        <h2>🎬 Animation, Film & Interaction Design</h2>
        <div class="video-grid">
            
            <div class="video-card">
                <a href="https://www.youtube.com/watch?v=63shdxQj6n0" target="_blank">
                    <img src="https://img.youtube.com/vi/63shdxQj6n0/0.jpg" alt="Motion Design">
                </a>
                <h3>Motion Design</h3>
                <p>Animated Short / Motion Graphics</p>
            </div>

            <div class="video-card">
                <a href="https://www.youtube.com/watch?v=fbkOTVymdUk" target="_blank">
                    <img src="https://img.youtube.com/vi/fbkOTVymdUk/0.jpg" alt="PULSE">
                </a>
                <h3>PULSE</h3>
                <p>Short Film / Credits Animation</p>
            </div>

            <div class="video-card">
                <a href="https://www.youtube.com/watch?v=xfQ1zUqHuC0" target="_blank">
                    <img src="https://img.youtube.com/vi/xfQ1zUqHuC0/0.jpg" alt="NEXUS">
                </a>
                <h3>NEXUS</h3>
                <p>Short Film</p>
            </div>

            <div class="video-card">
                <a href="https://www.youtube.com/watch?v=7KUfS_qaQ1Q" target="_blank">
                    <img src="https://img.youtube.com/vi/7KUfS_qaQ1Q/0.jpg" alt="Media Bias Trailer">
                </a>
                <h3>Media Bias Exhibit</h3>
                <p>Deutsches Museum Trailer</p>
            </div>

        </div>
    </div>

</body>
</html>
